version: '3.8'

services:
  gotoon:
    build: .
    ports:
      - "8080:8080"   # JSON inbound
      - "2112:2112"   # Prometheus (if integrated, planned for future)
    command: ["./gotoon", "-l", "8080", "-t", "toon-target:9999"]
    depends_on:
      - toon-target

  toon-target:
    image: alpine
    container_name: toon-target
    command: >
      sh -c "apk add --no-cache socat && 
             log_file=/tmp/toon.log &&
             echo 'TOON Mock Server started. Watching /tmp/toon.log' &&
             socat -u TCP-LISTEN:9999,fork,reuseaddr STDOUT"
    ports:
      - "9999:9999"